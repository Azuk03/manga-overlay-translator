<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Manga Overlay Translator</title>
<style>
  body {
    width: 280px;
    font-family: -apple-system, "Segoe UI", sans-serif;
    padding: 12px;
    margin: 0;
  }
  h1 {
    font-size: 14px;
    margin: 0 0 10px 0;
  }
  button {
    width: 100%;
    padding: 8px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .status {
    font-size: 12px;
    margin-top: 4px;
    min-height: 16px;
  }
  hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 12px 0;
  }
</style>
</head>
<body>
  <h1>Manga Overlay Translator</h1>

  <button id="btn-translate">Dịch trang này</button>
  <div id="translate-status" class="status"></div>

  <hr>

  <script src="popup.js"></script>
</body>
</html>
